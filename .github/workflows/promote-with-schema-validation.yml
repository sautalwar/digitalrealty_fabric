name: "🚀 Promote with Schema Validation"

on:
  # ── Auto-trigger: fires when schema files change on main ──────────────────
  push:
    branches:
      - main
    paths:
      - "notebooks/00_schema_registry.py"   # schema definitions changed
      - "notebooks/00_sync_to_uat.py"       # schema enforcer changed
      - "migrations/**"                      # new migration scripts added
      - "scripts/**"                         # discovery/generation scripts changed
      - ".github/workflows/promote-with-schema-validation.yml"

  # ── Manual trigger: use for on-demand promotion or demo ───────────────────
  workflow_dispatch:
    inputs:
      source_stage:
        description: "Source stage"
        required: true
        type: choice
        options:
          - Development
          - UAT
      target_stage:
        description: "Target stage"
        required: true
        type: choice
        options:
          - UAT
          - Production
      dry_run:
        description: "Dry run — validate only, no deployment (safe for demos)"
        required: false
        type: boolean
        default: false
      schema_version:
        description: "Schema version label (leave blank to auto-detect)"
        required: false
        type: string
        default: "auto"

concurrency:
  group: fabric-promotion
  cancel-in-progress: false

# ── Defaults: push trigger = Dev→UAT, no dry-run ─────────────────────────────
# When triggered by push (schema file changed), SOURCE/TARGET/DRY_RUN default
# to Development → UAT with dry_run=false.  Manual dispatch overrides these.
env:
  SOURCE_STAGE:  ${{ github.event.inputs.source_stage || 'Development' }}
  TARGET_STAGE:  ${{ github.event.inputs.target_stage || 'UAT' }}
  DRY_RUN_FLAG:  ${{ github.event.inputs.dry_run      || 'false' }}
  TRIGGER_TYPE:  ${{ github.event_name == 'push' && 'auto (schema change)' || 'manual' }}

# ─────────────────────────────────────────────────────────────────────────────
# SETUP: Required GitHub configuration before running:
#
# Secrets (Settings → Secrets → Actions):
#   FABRIC_TENANT_ID       Azure AD tenant ID
#   FABRIC_CLIENT_ID       Service principal app (client) ID
#   FABRIC_CLIENT_SECRET   Service principal secret
#
# Variables (Settings → Variables → Actions):
#   DEPLOYMENT_PIPELINE_ID   Fabric deployment pipeline ID (GUID)
#   DEV_WORKSPACE_ID         Dev workspace ID (GUID)
#   UAT_WORKSPACE_ID         UAT workspace ID (GUID)
#   PROD_WORKSPACE_ID        Prod workspace ID (GUID)
#
# Environments (Settings → Environments):
#   promotion-approval       Add required reviewers for the approval gate
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1 — Pre-flight: validate schema registry, summarise plan
  # Runs immediately — no approval needed
  # ───────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Pre-flight Schema Validation"
    runs-on: ubuntu-latest
    outputs:
      schema_version: ${{ steps.schema.outputs.version }}
      table_count: ${{ steps.schema.outputs.table_count }}
      dry_run: ${{ env.DRY_RUN_FLAG }}
      source_workspace_id: ${{ steps.resolve_ws.outputs.source_workspace_id }}
      target_workspace_id: ${{ steps.resolve_ws.outputs.target_workspace_id }}
      source_lakehouse_id: ${{ steps.discover.outputs.source_lakehouse_id }}
      lakehouse_count: ${{ steps.discover.outputs.lakehouse_count }}
    steps:
      - uses: actions/checkout@v4

      - name: "🔍 Resolve Workspace IDs from Fabric API"
        id: resolve_ws
        run: |
          # Map stage names to Fabric workspace display names
          case "${{ env.SOURCE_STAGE }}" in
            "Development") SOURCE_NAME="DigitalRealty-Dev" ;;
            "UAT")         SOURCE_NAME="DigitalRealty-UAT" ;;
            *)             SOURCE_NAME="DigitalRealty-Dev" ;;
          esac
          case "${{ env.TARGET_STAGE }}" in
            "UAT")        TARGET_NAME="DigitalRealty-UAT" ;;
            "Production") TARGET_NAME="DigitalRealty-Prod" ;;
            *)            TARGET_NAME="DigitalRealty-UAT" ;;
          esac

          echo "Looking up: $SOURCE_NAME  →  $TARGET_NAME"

          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "⚠️  No credentials — workspace ID lookup skipped"
            echo "source_workspace_id=DEMO" >> $GITHUB_OUTPUT
            echo "target_workspace_id=DEMO" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')

            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "⚠️  Token acquisition failed — workspace IDs cannot be resolved"
              echo "source_workspace_id=DEMO" >> $GITHUB_OUTPUT
              echo "target_workspace_id=DEMO" >> $GITHUB_OUTPUT
            else
              WORKSPACES=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "https://api.fabric.microsoft.com/v1/workspaces")

              SOURCE_ID=$(echo "$WORKSPACES" | jq -r --arg n "$SOURCE_NAME" \
                '.value[] | select(.displayName == $n) | .id')
              TARGET_ID=$(echo "$WORKSPACES" | jq -r --arg n "$TARGET_NAME" \
                '.value[] | select(.displayName == $n) | .id')

              if [ -z "$SOURCE_ID" ] || [ "$SOURCE_ID" = "null" ]; then
                echo "❌ Workspace not found: $SOURCE_NAME"
                echo "Available workspaces:"
                echo "$WORKSPACES" | jq -r '.value[] | "  \(.displayName) (\(.id))"'
                exit 1
              fi
              if [ -z "$TARGET_ID" ] || [ "$TARGET_ID" = "null" ]; then
                echo "❌ Workspace not found: $TARGET_NAME"
                echo "Available workspaces:"
                echo "$WORKSPACES" | jq -r '.value[] | "  \(.displayName) (\(.id))"'
                exit 1
              fi

              echo "✅ $SOURCE_NAME  =  $SOURCE_ID"
              echo "✅ $TARGET_NAME  =  $TARGET_ID"
              echo "source_workspace_id=$SOURCE_ID" >> $GITHUB_OUTPUT
              echo "target_workspace_id=$TARGET_ID" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🔬 Discover Live Schemas from Source Workspace"
        id: discover
        run: |
          WS_ID="${{ steps.resolve_ws.outputs.source_workspace_id }}"
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ] || [ "$WS_ID" = "DEMO" ] || [ -z "$WS_ID" ]; then
            echo "⚠️  No credentials or workspace ID — schema discovery skipped"
            echo "discovered=false" >> $GITHUB_OUTPUT
          else
            FABRIC_TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')

            STORAGE_TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://storage.azure.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')

            FABRIC_TOKEN="$FABRIC_TOKEN" \
            STORAGE_TOKEN="$STORAGE_TOKEN" \
            WORKSPACE_ID="$WS_ID" \
            OUT_FILE="schema_discovery.json" \
            python3 scripts/discover_fabric_schema.py

            if [ -f schema_discovery.json ]; then
              echo "discovered=true" >> $GITHUB_OUTPUT
              LH_COUNT=$(python3 -c "import json; d=json.load(open('schema_discovery.json')); print(len(d.get('lakehouses', [d])))")
              TOTAL_TABLES=$(python3 -c "import json; d=json.load(open('schema_discovery.json')); print(d.get('total_table_count', d.get('table_count', 0)))")
              FIRST_LH_ID=$(python3 -c "import json; d=json.load(open('schema_discovery.json')); lhs=d.get('lakehouses',[]); print(lhs[0]['lakehouse_id'] if lhs else d.get('lakehouse_id',''))")
              echo "Discovered $TOTAL_TABLES tables across $LH_COUNT lakehouse(s)"
              echo "source_lakehouse_id=$FIRST_LH_ID" >> $GITHUB_OUTPUT
              echo "lakehouse_count=$LH_COUNT" >> $GITHUB_OUTPUT
            else
              echo "⚠️  Schema discovery failed — falling back to static registry"
              echo "discovered=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "📋 Read Schema Registry"
        id: schema
        run: |
          if [ -f schema_discovery.json ]; then
            TABLE_COUNT=$(python3 -c "import json; d=json.load(open('schema_discovery.json')); print(d.get('total_table_count', d.get('table_count', 0)))")
            VERSION="live-$(date +%Y%m%d)"
          else
            VERSION=$(python3 -c "
          import re
          content = open('notebooks/00_schema_registry.py').read()
          m = re.search(r'SCHEMA_VERSION\s*=\s*[\"\']([\d.]+)', content)
          print(m.group(1) if m else 'unknown')
            ")
            TABLE_COUNT=$(python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          print(len(SCHEMAS))
            ")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "table_count=$TABLE_COUNT" >> $GITHUB_OUTPUT
          echo "Schema Version : $VERSION"
          echo "Tables found   : $TABLE_COUNT"

      - name: "✅ Validate Schema"
        run: |
          if [ -f schema_discovery.json ]; then
            python3 -c "
          import json
          d = json.load(open('schema_discovery.json'))
          lhs = d.get('lakehouses', [])
          if lhs:
              print(f'Workspace  : {d.get(\"workspace_id\", \"unknown\")}')
              print(f'Lakehouses : {len(lhs)}')
              total = d.get('total_table_count', 0)
              print(f'Total tables: {total}')
              print()
              for lh in lhs:
                  name = lh.get('lakehouse_name', '?')
                  lh_id = lh.get('lakehouse_id', '?')
                  tc = lh.get('table_count', 0)
                  schemas = lh.get('schemas', {})
                  print(f'  {name} ({lh_id}): {tc} tables')
                  for sn, tbls in schemas.items():
                      print(f'    schema {sn!r}: {tbls}')
              print()
              print('Schema discovery: OK')
          else:
              print(f'Workspace  : {d[\"workspace_id\"]}')
              print(f'Lakehouse  : {d[\"lakehouse_name\"]} ({d[\"lakehouse_id\"]})')
              print(f'Tables     : {d[\"table_count\"]}')
              for t, s in d.get('tables', {}).items():
                  print(f'  {t}: {len(s.get(\"columns\",[]))} columns')
              print('Schema discovery: OK')
            "
          else
            python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          print(f'Schema version  : {SCHEMA_VERSION}')
          total_cols = sum(len(s[\"columns\"]) for s in SCHEMAS.values())
          print(f'Tables: {len(SCHEMAS)},  Columns total: {total_cols}')
          for t, s in SCHEMAS.items():
              print(f'  {t}: {len(s[\"columns\"])} columns')
          print('Schema registry syntax: OK')
            "
          fi

      - name: "📊 Write Pre-flight Summary"
        run: |
          VERSION="${{ steps.schema.outputs.version }}"
          TABLE_COUNT="${{ steps.schema.outputs.table_count }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"

          {
            echo "# 🚀 Schema Promotion Pre-flight"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Promotion** | \`$SOURCE\` → \`$TARGET\` |"
            echo "| **Schema Version** | \`v$VERSION\` |"
            echo "| **Tables** | $TABLE_COUNT |"
            echo "| **Dry Run** | $DRY_RUN |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "## Tables in Schema Registry"
            echo ""
            echo "| Table | Layer | Columns |"
            echo "|---|---|---|"
            python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          for t, s in SCHEMAS.items():
              layer = '🟫 Bronze' if t.startswith('bronze') else '🪙 Silver'
              print(f'| \`{t}\` | {layer} | {len(s[\"columns\"])} |')
            "
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "> ⚠️ **DRY RUN** — validation only, no deployment will occur."
            else
              echo "> ✅ Pre-flight passed. Awaiting approval to deploy."
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: "📤 Upload Schema Discovery Artifact"
        if: steps.discover.outputs.discovered == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: schema-discovery
          path: schema_discovery.json
          retention-days: 1

  # ───────────────────────────────────────────────────────────
  # JOB 2 — Deploy
  # Runs automatically after preflight
  # ───────────────────────────────────────────────────────────
  deploy:
    name: "🚢 Deploy via Fabric Pipeline"
    runs-on: ubuntu-latest
    needs: preflight
    # No approval gate -- runs automatically after preflight
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "⚠️  No FABRIC_TENANT_ID secret — running in demo/dry-run mode"
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "⚠️  Token acquisition failed — running in demo/dry-run mode"
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🏗️ Verify Source & Target Workspaces"
        run: |
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"
          SRC_WS="${{ needs.preflight.outputs.source_workspace_id }}"
          TGT_WS="${{ needs.preflight.outputs.target_workspace_id }}"
          TOKEN="${{ steps.token.outputs.token }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"

          echo "============================================"
          echo "  Workspace Promotion Gate"
          echo "  $SOURCE → $TARGET"
          echo "  Schema v$SCHEMA_VERSION"
          echo "============================================"
          echo ""
          echo "  Source workspace : $SOURCE  ($SRC_WS)"
          echo "  Target workspace : $TARGET  ($TGT_WS)"
          echo ""

          if [ "$DEMO_MODE" = "true" ] || [ -z "$TOKEN" ] || [ "$TOKEN" = "DEMO_TOKEN" ] || [ "$SRC_WS" = "DEMO" ]; then
            echo "⚠️  Token or workspace IDs unavailable — skipping live API checks"
            echo "   Schema enforcement will still run in Job 3"
          else
            echo "🔍 Source workspace items ($SOURCE):"
            SRC_ITEMS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$SRC_WS/items")
            echo "$SRC_ITEMS" | jq -r '.value[] | "  [\(.type)] \(.displayName)"' 2>/dev/null \
              || echo "  (no items or could not parse response)"
            SRC_COUNT=$(echo "$SRC_ITEMS" | jq '.value | length' 2>/dev/null || echo "?")
            echo "  Total: $SRC_COUNT items in $SOURCE"

            echo ""
            echo "🔍 Target workspace items ($TARGET — before promotion):"
            TGT_ITEMS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$TGT_WS/items")
            echo "$TGT_ITEMS" | jq -r '.value[] | "  [\(.type)] \(.displayName)"' 2>/dev/null \
              || echo "  (no items — schemas have not been promoted yet)"
            TGT_COUNT=$(echo "$TGT_ITEMS" | jq '.value | length' 2>/dev/null || echo "?")
            echo "  Total: $TGT_COUNT items in $TARGET"

            echo ""
            echo "✅  Both workspaces verified — proceeding to deployment"
          fi

      - name: "🔄 Sync UAT Workspace from Git & Stage for Schema Promotion"
        run: |
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          TOKEN="${{ steps.token.outputs.token }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"
          UAT_WS="a27b49db-255b-499e-a2ac-e00f8b812d1a"

          if [ "$DRY_RUN" = "true" ] || [ "$DEMO_MODE" = "true" ] || [ -z "$TOKEN" ] || [ "$TOKEN" = "DEMO_TOKEN" ]; then
            echo "▶  DRY RUN — would sync UAT workspace from Git"
            echo "✅  Dry run complete"
          else
            # ── Step 1: Get Git status for proper commit hashes ────────────
            echo "🔍 Getting Git status for UAT workspace ($UAT_WS)..."
            GIT_STATUS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$UAT_WS/git/status")
            REMOTE_HASH=$(echo "$GIT_STATUS" | jq -r '.remoteCommitHash // empty' 2>/dev/null)
            WS_HEAD=$(echo "$GIT_STATUS" | jq -r '.workspaceHead // empty' 2>/dev/null)
            echo "   Remote commit hash : ${REMOTE_HASH:-<not available>}"
            echo "   Workspace head     : ${WS_HEAD:-<not available>}"

            # ── Step 2: Trigger Git sync on UAT workspace ──────────────────
            echo ""
            echo "🔄 Triggering Git sync on UAT workspace ($UAT_WS)..."
            SYNC_BODY_JSON="{\"remoteCommitHash\": \"${REMOTE_HASH}\", \"workspaceHead\": \"${WS_HEAD}\", \"conflictResolution\": {\"conflictResolutionType\": \"Workspace\", \"conflictResolutionPolicy\": \"PreferRemote\"}, \"options\": {\"allowOverrideItems\": true}}"
            if [ -z "$REMOTE_HASH" ] || [ -z "$WS_HEAD" ]; then
              echo "   ⚠️  Could not get commit hashes from Git status — using null fallback"
              SYNC_BODY_JSON='{"remoteCommitHash": null, "workspaceHead": null, "conflictResolution": {"conflictResolutionType": "Workspace", "conflictResolutionPolicy": "PreferRemote"}, "options": {"allowOverrideItems": true}}'
            fi
            SYNC_RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.fabric.microsoft.com/v1/workspaces/$UAT_WS/git/updateFromGit" \
              -d "$SYNC_BODY_JSON")
            SYNC_HTTP=$(echo "$SYNC_RESP" | tail -1)
            SYNC_BODY=$(echo "$SYNC_RESP" | head -n -1)
            echo "   Git sync response: HTTP $SYNC_HTTP"

            if [ "$SYNC_HTTP" = "200" ]; then
              echo "✅ UAT workspace synced from Git (sync complete)"
            elif [ "$SYNC_HTTP" = "202" ]; then
              echo "⏳ Git sync started (async) — polling for completion..."
              OP_URL=$(echo "$SYNC_BODY" | jq -r '.url // empty' 2>/dev/null)
              if [ -n "$OP_URL" ]; then
                for i in $(seq 1 12); do
                  sleep 10
                  S=$(curl -s -H "Authorization: Bearer $TOKEN" "$OP_URL" | jq -r '.status // "Unknown"' 2>/dev/null)
                  echo "   Poll $i: $S"
                  [ "$S" = "Succeeded" ] && echo "✅ Git sync completed" && break
                  [ "$S" = "Failed"    ] && echo "⚠️  Git sync failed — Deployment Pipeline will handle promotion" && break
                done
              fi
            else
              echo "⚠️  Git sync returned HTTP $SYNC_HTTP"
              echo "   Body: $SYNC_BODY"
              echo "   Deployment Pipeline will handle promotion in the next step"
            fi

            # ── Step 3: Deploy via Fabric Deployment Pipeline API ──────────
            PIPELINE_ID="${{ vars.DEPLOYMENT_PIPELINE_ID }}"
            if [ -n "$PIPELINE_ID" ]; then
              echo ""
              echo "🚀 Triggering Fabric Deployment Pipeline ($PIPELINE_ID)..."
              echo "   Deploying from $SOURCE (stage 0) → $TARGET (stage 1)"

              # Map stage names to stage order (Development=0, Test/UAT=1, Production=2)
              SOURCE_STAGE_ORDER=0
              TARGET_STAGE_ORDER=1

              DEPLOY_RESP=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.fabric.microsoft.com/v1/deploymentPipelines/$PIPELINE_ID/deploy" \
                -d "{\"sourceStageOrder\": $SOURCE_STAGE_ORDER, \"isBackwardDeployment\": false, \"newWorkspace\": false, \"options\": {\"allowOverrideItems\": true, \"allowCreateNewArtifact\": true, \"allowPurgeData\": false}}")
              DEPLOY_HTTP=$(echo "$DEPLOY_RESP" | tail -1)
              DEPLOY_BODY=$(echo "$DEPLOY_RESP" | head -n -1)
              echo "   Deployment Pipeline response: HTTP $DEPLOY_HTTP"

              if [ "$DEPLOY_HTTP" = "200" ] || [ "$DEPLOY_HTTP" = "202" ]; then
                echo "⏳ Deployment started — polling for completion..."
                DEPLOY_OP_URL=$(echo "$DEPLOY_BODY" | jq -r '.url // empty' 2>/dev/null)
                if [ -z "$DEPLOY_OP_URL" ]; then
                  # Try Location header pattern
                  DEPLOY_OP_ID=$(echo "$DEPLOY_BODY" | jq -r '.id // empty' 2>/dev/null)
                  if [ -n "$DEPLOY_OP_ID" ]; then
                    DEPLOY_OP_URL="https://api.fabric.microsoft.com/v1/deploymentPipelines/$PIPELINE_ID/operations/$DEPLOY_OP_ID"
                  fi
                fi
                if [ -n "$DEPLOY_OP_URL" ]; then
                  for i in $(seq 1 30); do
                    sleep 10
                    DS=$(curl -s -H "Authorization: Bearer $TOKEN" "$DEPLOY_OP_URL" | jq -r '.status // "Unknown"' 2>/dev/null)
                    echo "   Poll $i: $DS"
                    [ "$DS" = "Succeeded" ] && echo "✅ Deployment Pipeline completed successfully" && break
                    [ "$DS" = "Failed"    ] && echo "⚠️  Deployment Pipeline failed — check Fabric portal" && break
                  done
                else
                  echo "   (no operation URL returned — check portal for deployment status)"
                fi
              else
                echo "⚠️  Deployment Pipeline returned HTTP $DEPLOY_HTTP"
                echo "   Body: $DEPLOY_BODY"
                echo "   Schema enforcer will create tables directly via notebook"
              fi
            else
              echo ""
              echo "⚠️  DEPLOYMENT_PIPELINE_ID not set — skipping Deployment Pipeline"
              echo "   Set vars.DEPLOYMENT_PIPELINE_ID in GitHub repo settings to enable"
            fi

            # ── Step 4: List Dev Lakehouse tables as inventory (informational) ──
            DEV_WS="ffb373f3-c810-453a-b598-badb52dfd152"
            DEV_LH="11fedcf0-74de-4d96-88c2-9a171434c078"
            echo ""
            echo "📋 Dev Lakehouse tables (to be promoted to UAT):"
            TABLES=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$DEV_WS/lakehouses/$DEV_LH/tables")
            echo "$TABLES" | jq -r '.data[]? | "   ✔ \(.name) (\(.type))"' 2>/dev/null \
              || echo "   (tables will be discovered by schema enforcer via Delta logs)"
            echo ""
            echo "✅ Deploy stage complete — schema enforcer will replicate all Dev tables to UAT"
          fi
      - name: "📝 Write Deploy Summary"
        if: always()
        run: |
          {
            echo "## 🚢 Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Promotion** | \`${{ env.SOURCE_STAGE }}\` → \`${{ env.TARGET_STAGE }}\` |"
            echo "| **Schema Version** | \`v${{ needs.preflight.outputs.schema_version }}\` |"
            echo "| **Approved by** | @${{ github.actor }} |"
            if [ "${{ env.DRY_RUN_FLAG }}" = "true" ]; then
              echo "| **Status** | ⚠️ Dry run — no changes deployed |"
            else
              echo "| **Status** | ✅ Deployment pipeline triggered |"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────
  # JOB 3 — Schema Enforcement
  # Runs 00_sync_to_uat in the target workspace to create/update tables
  # ───────────────────────────────────────────────────────────
  enforce-schemas:
    name: "🗄️ Enforce Schemas in Target Workspace"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    outputs:
      uat_table_count: ${{ steps.enforce.outputs.uat_table_count }}
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "📥 Download Schema Discovery Artifact"
        id: artifact
        uses: actions/download-artifact@v4
        with:
          name: schema-discovery
        continue-on-error: true

      - name: "🗄️ Upload & Run Schema Enforcement Notebooks (All Lakehouses)"
        id: enforce
        run: |
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          TOKEN="${{ steps.token.outputs.token }}"
          WS_ID="${{ needs.preflight.outputs.target_workspace_id }}"
          SOURCE_WS_ID="${{ needs.preflight.outputs.source_workspace_id }}"
          TABLE_COUNT="${{ needs.preflight.outputs.table_count }}"

          echo "Target workspace : $TARGET ($WS_ID)"
          echo "Source workspace : $SOURCE_WS_ID"
          echo "Schema version   : ${{ needs.preflight.outputs.schema_version }}"
          echo ""

          # ── Determine lakehouse count from discovery JSON ─────────────────
          LAKEHOUSE_COUNT=0
          if [ -f schema_discovery.json ]; then
            LAKEHOUSE_COUNT=$(python3 -c "
          import json
          d = json.load(open('schema_discovery.json'))
          lhs = d.get('lakehouses', [])
          if lhs:
              print(len(lhs))
          elif 'lakehouse_id' in d:
              print(1)
          else:
              print(0)
            ")
            echo "Lakehouses in discovery JSON: $LAKEHOUSE_COUNT"
          else
            echo "No schema_discovery.json — runtime discovery only"
          fi

          if [ "$TABLE_COUNT" = "0" ] && [ "$LAKEHOUSE_COUNT" = "0" ]; then
            echo "Schema discovery found 0 tables and 0 lakehouses."
            echo "   Runtime discovery inside Fabric Spark may still find tables."
            echo "   Generating 1 notebook with runtime-only discovery..."
            LAKEHOUSE_COUNT=1
          fi

          # ── List ALL lakehouses in target workspace ───────────────────────
          ALL_UAT_LH=""
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "DEMO_TOKEN" ] && [ -n "$WS_ID" ]; then
            ALL_UAT_LH=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Lakehouse")
            echo "UAT lakehouses:"
            echo "$ALL_UAT_LH" | jq -r '.value[]? | "  \(.displayName) (\(.id))"' 2>/dev/null || echo "  (none found)"
            echo ""
          fi

          # ── DRY RUN shortcut ──────────────────────────────────────────────
          if [ "$DRY_RUN" = "true" ] || [ "$DEMO_MODE" = "true" ] || [ -z "$WS_ID" ] || [[ "$WS_ID" == "<"* ]]; then
            echo "DRY RUN — would upload & run notebooks for $LAKEHOUSE_COUNT lakehouses"
            echo "uat_table_count=0" >> $GITHUB_OUTPUT
            rm -f /tmp/nb_payload.json
            exit 0
          fi

          # ── Helper: upload or update a notebook ───────────────────────────
          upload_notebook() {
            local NB_NAME="$1" WS="$2" TK="$3"

            CREATE_RESP=$(curl -s -D /tmp/nb_hdrs.txt -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TK" \
              -H "Content-Type: application/json" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS/items" \
              -d @/tmp/nb_payload.json)
            HTTP=$(echo "$CREATE_RESP" | tail -1)
            BODY=$(echo "$CREATE_RESP" | head -n -1)
            local NB_ID=""

            if [ "$HTTP" = "201" ]; then
              NB_ID=$(echo "$BODY" | jq -r '.id')
              echo "  Created: $NB_ID"
            elif [ "$HTTP" = "202" ]; then
              local LOC=$(grep -i "^operation-location:" /tmp/nb_hdrs.txt 2>/dev/null | tr -d '\r' | awk '{print $2}')
              [ -z "$LOC" ] && LOC=$(grep -i "^location:" /tmp/nb_hdrs.txt 2>/dev/null | tr -d '\r' | awk '{print $2}')
              echo "  Async creation — polling..."
              for ci in $(seq 1 18); do
                sleep 10
                if [ -n "$LOC" ]; then
                  local SR=$(curl -s -H "Authorization: Bearer $TK" "$LOC")
                  local ST=$(echo "$SR" | jq -r '.status // .Status // empty')
                  echo "    Poll $ci: $ST"
                  if [ "$ST" = "Succeeded" ]; then
                    NB_ID=$(echo "$SR" | jq -r '.resourceLocation // empty' | sed 's/.*\///')
                    [ -z "$NB_ID" ] && NB_ID=$(curl -s -H "Authorization: Bearer $TK" \
                      "https://api.fabric.microsoft.com/v1/workspaces/$WS/items?type=Notebook" \
                      | jq -r --arg n "$NB_NAME" '.value[] | select(.displayName == $n) | .id // empty')
                    break
                  elif [ "$ST" = "Failed" ]; then break; fi
                else
                  NB_ID=$(curl -s -H "Authorization: Bearer $TK" \
                    "https://api.fabric.microsoft.com/v1/workspaces/$WS/items?type=Notebook" \
                    | jq -r --arg n "$NB_NAME" '.value[] | select(.displayName == $n) | .id // empty')
                  [ -n "$NB_ID" ] && break
                fi
              done
            elif [ "$HTTP" = "409" ]; then
              NB_ID=$(curl -s -H "Authorization: Bearer $TK" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS/items?type=Notebook" \
                | jq -r --arg n "$NB_NAME" '.value[] | select(.displayName == $n) | .id // empty')
              if [ -n "$NB_ID" ]; then
                echo "  Exists ($NB_ID) — updating definition..."
                local NB_DEF=$(jq '{definition: .definition}' /tmp/nb_payload.json)
                local UR=$(curl -s -D /tmp/upd_h.txt -w "\n%{http_code}" -X POST \
                  -H "Authorization: Bearer $TK" -H "Content-Type: application/json" \
                  "https://api.fabric.microsoft.com/v1/workspaces/$WS/items/$NB_ID/updateDefinition" \
                  -d "$NB_DEF")
                local UH=$(echo "$UR" | tail -1)
                echo "    Update: HTTP $UH"
                if [ "$UH" = "202" ]; then
                  local UL=$(grep -i "^operation-location:" /tmp/upd_h.txt 2>/dev/null | tr -d '\r' | awk '{print $2}')
                  [ -z "$UL" ] && UL=$(grep -i "^location:" /tmp/upd_h.txt 2>/dev/null | tr -d '\r' | awk '{print $2}')
                  if [ -n "$UL" ]; then
                    for ui in $(seq 1 12); do
                      sleep 10
                      local US=$(curl -s -H "Authorization: Bearer $TK" "$UL" | jq -r '.status // .Status // empty')
                      echo "    Update poll $ui: $US"
                      [ "$US" = "Succeeded" ] || [ "$US" = "Failed" ] && break
                    done
                  else sleep 15; fi
                fi
                rm -f /tmp/upd_h.txt
              fi
            else
              echo "  Upload HTTP $HTTP — finding existing..."
              NB_ID=$(curl -s -H "Authorization: Bearer $TK" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS/items?type=Notebook" \
                | jq -r --arg n "$NB_NAME" '.value[] | select(.displayName == $n) | .id // empty')
              if [ -n "$NB_ID" ]; then
                echo "  Found ($NB_ID) — updating..."
                local NB_DEF=$(jq '{definition: .definition}' /tmp/nb_payload.json)
                curl -s -X POST \
                  -H "Authorization: Bearer $TK" -H "Content-Type: application/json" \
                  "https://api.fabric.microsoft.com/v1/workspaces/$WS/items/$NB_ID/updateDefinition" \
                  -d "$NB_DEF" >/dev/null 2>&1
                sleep 15
              fi
            fi
            rm -f /tmp/nb_hdrs.txt
            echo "$NB_ID"
          }

          # ── Helper: run notebook and poll for completion ──────────────────
          run_and_poll() {
            local NB_ID="$1" WS="$2" TK="$3"
            local RR=$(curl -s -w "\n%{http_code}" -D /tmp/run_h.txt -X POST \
              -H "Authorization: Bearer $TK" -H "Content-Type: application/json" -H "Content-Length: 0" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS/items/$NB_ID/jobs/instances?jobType=RunNotebook")
            local RH=$(echo "$RR" | tail -1)
            if [ "$RH" = "202" ] || [ "$RH" = "200" ]; then
              echo "  Triggered (HTTP $RH)"
              local JL=$(grep -i "^location:" /tmp/run_h.txt | tr -d '\r' | awk '{print $2}')
              if [ -n "$JL" ]; then
                for a in $(seq 1 60); do
                  sleep 30
                  local FULL_RESP=$(curl -s -H "Authorization: Bearer $TK" "$JL")
                  local JS=$(echo "$FULL_RESP" | jq -r '.status // empty')
                  echo "    Poll $a/60: $JS"
                  if [ "$JS" = "Completed" ]; then echo "  COMPLETED"; rm -f /tmp/run_h.txt; return 0; fi
                  if [ "$JS" = "Failed" ] || [ "$JS" = "Cancelled" ]; then
                    echo "  $JS"
                    # Capture failure details from the job status response
                    local FAIL_REASON=$(echo "$FULL_RESP" | jq -r '.failureReason // empty')
                    local FAIL_MSG=$(echo "$FULL_RESP" | jq -r '.error.message // empty')
                    local FAIL_ERR=$(echo "$FULL_RESP" | jq -r '.error.errorCode // empty')
                    [ -n "$FAIL_REASON" ] && echo "  FAILURE REASON: $FAIL_REASON"
                    [ -n "$FAIL_ERR" ]    && echo "  ERROR CODE: $FAIL_ERR"
                    [ -n "$FAIL_MSG" ]    && echo "  ERROR MESSAGE: $FAIL_MSG"
                    # Dump full response for debugging
                    echo "  FULL JOB STATUS:"
                    echo "$FULL_RESP" | jq '.' 2>/dev/null || echo "$FULL_RESP"
                    rm -f /tmp/run_h.txt; return 1
                  fi
                done
                echo "  Timed out (30 min)"; rm -f /tmp/run_h.txt; return 1
              else echo "  No Location header"; rm -f /tmp/run_h.txt; return 1; fi
            else echo "  Trigger HTTP $RH — FAILED"; echo "  Response: $(echo "$RR" | head -5)"; rm -f /tmp/run_h.txt; return 1; fi
          }

          # ════════════════════════════════════════════════════════════════════
          # MAIN LOOP: Process each lakehouse
          # ════════════════════════════════════════════════════════════════════
          LH_OK=0; LH_FAIL=0; LH_SKIP=0

          # Cache storage token for status marker reading
          STORAGE_TOKEN_CACHED=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
            -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
            -d "scope=https://storage.azure.com/.default" \
            -d "grant_type=client_credentials" | jq -r '.access_token // empty')
          echo "Storage token cached: $([ -n "$STORAGE_TOKEN_CACHED" ] && echo 'yes' || echo 'no')"

          for i in $(seq 0 $((LAKEHOUSE_COUNT - 1))); do
            echo ""
            echo "================================================================"
            echo "LAKEHOUSE $((i+1)) / $LAKEHOUSE_COUNT"
            echo "================================================================"

            # Read lakehouse info from discovery JSON
            LH_NAME=""; SOURCE_LH_ID=""; LH_TABLE_COUNT=0
            if [ -f schema_discovery.json ]; then
              LH_NAME=$(python3 -c "
          import json; d=json.load(open('schema_discovery.json'))
          lhs=d.get('lakehouses',[])
          if lhs and $i<len(lhs): print(lhs[$i].get('lakehouse_name',''))
          elif $i==0 and 'lakehouse_name' in d: print(d['lakehouse_name'])
          else: print('')
              " 2>/dev/null)
              SOURCE_LH_ID=$(python3 -c "
          import json; d=json.load(open('schema_discovery.json'))
          lhs=d.get('lakehouses',[])
          if lhs and $i<len(lhs): print(lhs[$i].get('lakehouse_id',''))
          elif $i==0 and 'lakehouse_id' in d: print(d['lakehouse_id'])
          else: print('')
              " 2>/dev/null)
              LH_TABLE_COUNT=$(python3 -c "
          import json; d=json.load(open('schema_discovery.json'))
          lhs=d.get('lakehouses',[])
          if lhs and $i<len(lhs): print(lhs[$i].get('table_count',0))
          elif $i==0: print(d.get('table_count',0))
          else: print(0)
              " 2>/dev/null)
            fi

            echo "  Lakehouse    : $LH_NAME"
            echo "  Source LH ID : $SOURCE_LH_ID"
            echo "  Tables       : $LH_TABLE_COUNT"

            # Find matching UAT lakehouse by displayName
            UAT_LH_ID=""
            if [ -n "$LH_NAME" ] && [ -n "$ALL_UAT_LH" ]; then
              UAT_LH_ID=$(echo "$ALL_UAT_LH" | jq -r --arg n "$LH_NAME" \
                '.value[] | select(.displayName == $n) | .id // empty' | head -1)
            fi
            # Fallback for single lakehouse: use first UAT lakehouse
            if [ -z "$UAT_LH_ID" ] && [ "$LAKEHOUSE_COUNT" = "1" ]; then
              UAT_LH_ID=$(echo "$ALL_UAT_LH" | jq -r '.value[0].id // empty' 2>/dev/null)
              echo "  UAT LH (fallback first): $UAT_LH_ID"
            fi
            if [ -z "$UAT_LH_ID" ]; then
              echo "  No matching lakehouse '$LH_NAME' in target — SKIPPING"
              LH_SKIP=$((LH_SKIP + 1))
              continue
            fi
            echo "  Target LH ID : $UAT_LH_ID"

            # Unique notebook name per lakehouse
            NB_DISPLAY_NAME="00_sync_${LH_NAME}"
            echo "  Notebook     : $NB_DISPLAY_NAME"

            # Generate notebook payload for this lakehouse
            echo "  Generating notebook payload..."
            SCHEMA_FILE="schema_discovery.json" \
            LAKEHOUSE_ID="$UAT_LH_ID" \
            WORKSPACE_ID="$WS_ID" \
            SOURCE_WORKSPACE_ID="$SOURCE_WS_ID" \
            SOURCE_LAKEHOUSE_ID="$SOURCE_LH_ID" \
            LAKEHOUSE_INDEX="$i" \
            NOTEBOOK_DISPLAY_NAME="$NB_DISPLAY_NAME" \
            python3 scripts/gen_nb_payload.py

            # Upload notebook
            echo "  Uploading notebook..."
            NOTEBOOK_ID=$(upload_notebook "$NB_DISPLAY_NAME" "$WS_ID" "$TOKEN" | tail -1)

            if [ -z "$NOTEBOOK_ID" ]; then
              echo "  Could not create/find notebook for $LH_NAME"
              LH_FAIL=$((LH_FAIL + 1))
              continue
            fi

            # Run notebook
            echo "  Running notebook $NOTEBOOK_ID..."
            if run_and_poll "$NOTEBOOK_ID" "$WS_ID" "$TOKEN"; then
              echo "  Lakehouse $LH_NAME: SUCCESS"
              LH_OK=$((LH_OK + 1))
            else
              echo "  Lakehouse $LH_NAME: FAILED"
              LH_FAIL=$((LH_FAIL + 1))
            fi

            # Read sync status marker from OneLake (if available)
            if [ -n "$STORAGE_TOKEN_CACHED" ]; then
              echo "  Reading sync status marker..."
              STATUS_JSON=$(curl -s \
                -H "Authorization: Bearer $STORAGE_TOKEN_CACHED" \
                -H "x-ms-version: 2023-01-03" \
                "https://onelake.dfs.fabric.microsoft.com/$WS_ID/$UAT_LH_ID/Files/___sync_status.json" 2>/dev/null || true)
              if echo "$STATUS_JSON" | jq -e '.status' >/dev/null 2>&1; then
                echo "  ---- SYNC STATUS MARKER ----"
                echo "$STATUS_JSON" | jq '.'
                SYN_OK=$(echo "$STATUS_JSON" | jq -r '.tables_synced | length // 0')
                SYN_FAIL=$(echo "$STATUS_JSON" | jq -r '.tables_failed | length // 0')
                echo "  Synced: $SYN_OK  Failed: $SYN_FAIL"
                echo "  ----------------------------"
              else
                echo "  (no status marker found)"
              fi
            fi
            rm -f /tmp/nb_payload.json
          done

          # ── Post-sync verification: count tables across ALL UAT lakehouses ──
          echo ""
          echo "================================================================"
          echo "POST-SYNC VERIFICATION"
          echo "================================================================"

          TOTAL_UAT_TABLES=0
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "DEMO_TOKEN" ]; then
            STORAGE_TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://storage.azure.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')

            echo "$ALL_UAT_LH" | jq -r '.value[]? | "\(.id) \(.displayName)"' 2>/dev/null | \
            while IFS=' ' read -r lh_id lh_name; do
              [ -z "$lh_id" ] && continue
              echo "  Checking $lh_name ($lh_id)..."
              DFS_RESP=$(curl -s \
                -H "Authorization: Bearer $STORAGE_TOKEN" \
                -H "x-ms-version: 2023-01-03" \
                "https://onelake.dfs.fabric.microsoft.com/$WS_ID/$lh_id?resource=filesystem&directory=Tables&recursive=true")
              LH_TABLES=$(echo "$DFS_RESP" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin); paths=d.get('paths',[])
              skip={'_delta_log','_schemas','_temporary','__checkpoint','Files','TableMaintenance','Tables'}
              tables=set()
              for p in paths:
                  if p.get('isDirectory') in ('true',True):
                      parts=p['name'].split('/')
                      if len(parts)>=2 and parts[-1] not in skip and not parts[-1].startswith('_'):
                          tables.add(parts[-1])
              print(len(tables))
          except: print(0)
              " 2>/dev/null)
              echo "    Tables: ${LH_TABLES:-0}"
            done
          fi

          # Re-count total (pipe subshell loses vars, so re-query)
          if [ -n "$STORAGE_TOKEN" ] && [ "$STORAGE_TOKEN" != "null" ]; then
            TOTAL_UAT_TABLES=$(echo "$ALL_UAT_LH" | jq -r '.value[]?.id' 2>/dev/null | while read lh_id; do
              [ -z "$lh_id" ] && continue
              DFS=$(curl -s -H "Authorization: Bearer $STORAGE_TOKEN" -H "x-ms-version: 2023-01-03" \
                "https://onelake.dfs.fabric.microsoft.com/$WS_ID/$lh_id?resource=filesystem&directory=Tables&recursive=true")
              echo "$DFS" | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin); skip={'_delta_log','_schemas','_temporary','__checkpoint','Files','TableMaintenance','Tables'}
              t=set()
              for p in d.get('paths',[]):
                  if p.get('isDirectory') in ('true',True):
                      parts=p['name'].split('/')
                      if len(parts)>=2 and parts[-1] not in skip and not parts[-1].startswith('_'): t.add(parts[-1])
              print(len(t))
          except: print(0)
              " 2>/dev/null
            done | paste -sd+ | bc 2>/dev/null || echo "0")
          fi

          echo ""
          echo "================================================================"
          echo "SUMMARY"
          echo "================================================================"
          echo "  Lakehouses processed : $LAKEHOUSE_COUNT"
          echo "  Lakehouses OK        : $LH_OK"
          echo "  Lakehouses failed    : $LH_FAIL"
          echo "  Lakehouses skipped   : $LH_SKIP"
          echo "  Total UAT tables     : ${TOTAL_UAT_TABLES:-unknown}"
          echo "================================================================"

          echo "uat_table_count=${TOTAL_UAT_TABLES:-0}" >> $GITHUB_OUTPUT

          if [ "$LH_FAIL" -gt 0 ] && [ "$LH_OK" = "0" ]; then
            echo "All lakehouses failed"
            exit 1
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 4 — Data Quality Verification
  # Triggers 03_data_quality_checks in the target workspace
  # ───────────────────────────────────────────────────────────
  verify:
    name: "✅ Data Quality Verification"
    runs-on: ubuntu-latest
    needs: [preflight, enforce-schemas]
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🔬 Trigger Quality Checks Notebook (03_data_quality_checks)"
        run: |
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          WS_ID="${{ needs.preflight.outputs.target_workspace_id }}"
          CI_TABLE_COUNT="${{ needs.preflight.outputs.table_count }}"
          UAT_TABLE_COUNT="${{ needs.enforce-schemas.outputs.uat_table_count }}"

          # Use actual UAT table count if available, fall back to CI count
          if [ -n "$UAT_TABLE_COUNT" ] && [ "$UAT_TABLE_COUNT" != "unknown" ] && [ "$UAT_TABLE_COUNT" != "0" ]; then
            TABLE_COUNT="$UAT_TABLE_COUNT"
            echo "Using post-notebook UAT table count: $TABLE_COUNT"
          else
            TABLE_COUNT="$CI_TABLE_COUNT"
            echo "Using CI-time table count: $TABLE_COUNT"
          fi

          # Skip quality checks only when both CI and post-notebook counts are 0
          if [ "$TABLE_COUNT" = "0" ] && [ "$CI_TABLE_COUNT" = "0" ] && { [ -z "$UAT_TABLE_COUNT" ] || [ "$UAT_TABLE_COUNT" = "0" ] || [ "$UAT_TABLE_COUNT" = "unknown" ]; }; then
            echo "ℹ️  0 tables in UAT after notebook — skipping quality checks"
            echo "✅  Quality gate skipped (no tables to validate)"
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ] || [ "$DEMO_MODE" = "true" ] || [ -z "$WS_ID" ] || [[ "$WS_ID" == "<"* ]]; then
            echo "▶  DRY RUN — would trigger notebook: 03_data_quality_checks"
            echo "   Checks: row counts, null rates, duplicates, range validation"
            echo ""
            echo "✅  Dry run complete — quality gate would validate $TABLE_COUNT tables"
            echo "    - Row count minimum checks"
            echo "    - Null rate enforcement on key columns"
            echo "    - Duplicate detection on primary keys"
            echo "    - Range validation on numeric fields"
          else
            ITEMS=$(curl -s \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Notebook")

            QA_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName == "03_data_quality_checks") | .id')

            if [ -n "$QA_ID" ]; then
              curl -s -X POST \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                -H "Content-Length: 0" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items/$QA_ID/jobs/instances?jobType=RunNotebook"
              echo "✅  Quality checks notebook triggered in $TARGET"
            else
              echo "⚠️  03_data_quality_checks notebook not found — skipping quality gate"
            fi
          fi

      - name: "🏷️ Tag Promotion in Git"
        run: |
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — skipping Git tag"
          else
            TAG="promote-${TARGET,,}-schema-v${SCHEMA_VERSION}-$(date +%Y%m%d%H%M)"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "GitHub Actions"
            git tag "$TAG" || echo "Tag already exists, skipping"
            git push origin "$TAG" || echo "Could not push tag (non-fatal)"
            echo "✅  Tagged: $TAG"
          fi

      - name: "📊 Write Final Summary"
        if: always()
        run: |
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"
          CI_TABLE_COUNT="${{ needs.preflight.outputs.table_count }}"
          UAT_TABLE_COUNT="${{ needs.enforce-schemas.outputs.uat_table_count }}"
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"

          # Use actual UAT count from post-notebook verification (not CI discovery count)
          if [ -n "$UAT_TABLE_COUNT" ] && [ "$UAT_TABLE_COUNT" != "0" ] && [ "$UAT_TABLE_COUNT" != "unknown" ]; then
            TABLE_COUNT="$UAT_TABLE_COUNT"
          else
            TABLE_COUNT="$CI_TABLE_COUNT (CI discovery — check Fabric portal for actual count)"
          fi

          {
            echo "# ✅ Promotion Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Promoted** | \`$SOURCE\` → \`$TARGET\` |"
            echo "| **Schema Version** | \`v$SCHEMA_VERSION\` |"
            echo "| **Tables Synced** | $TABLE_COUNT |"
            echo "| **Quality Checks** | Triggered in \`$TARGET\` |"
            echo "| **Dry Run** | $DRY_RUN |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo ""
            echo "## What happened"
            echo "1. Schema registry validated"
            echo "2. Fabric deployment pipeline triggered (\`$SOURCE\` -> \`$TARGET\`)"
            echo "3. Data sync notebooks executed in \`$TARGET\` — **$TABLE_COUNT tables** synced across ALL lakehouses"
            echo "4. Data quality checks triggered in \`$TARGET\` workspace"
            echo ""
            echo "> **Next step:** Open \`$TARGET\` workspace in Fabric to verify ALL lakehouses have their tables."
          } >> $GITHUB_STEP_SUMMARY
