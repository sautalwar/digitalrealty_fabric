name: "🚀 Promote with Schema Validation"

on:
  # ── Auto-trigger: fires when schema files change on main ──────────────────
  push:
    branches:
      - main
    paths:
      - "notebooks/00_schema_registry.py"   # schema definitions changed
      - "notebooks/00_apply_schema.py"       # schema enforcer changed
      - "migrations/**"                      # new migration scripts added

  # ── Manual trigger: use for on-demand promotion or demo ───────────────────
  workflow_dispatch:
    inputs:
      source_stage:
        description: "Source stage"
        required: true
        type: choice
        options:
          - Development
          - UAT
      target_stage:
        description: "Target stage"
        required: true
        type: choice
        options:
          - UAT
          - Production
      dry_run:
        description: "Dry run — validate only, no deployment (safe for demos)"
        required: false
        type: boolean
        default: false
      schema_version:
        description: "Schema version label (leave blank to auto-detect)"
        required: false
        type: string
        default: "auto"

concurrency:
  group: fabric-promotion
  cancel-in-progress: false

# ── Defaults: push trigger = Dev→UAT, no dry-run ─────────────────────────────
# When triggered by push (schema file changed), SOURCE/TARGET/DRY_RUN default
# to Development → UAT with dry_run=false.  Manual dispatch overrides these.
env:
  SOURCE_STAGE:  ${{ github.event.inputs.source_stage || 'Development' }}
  TARGET_STAGE:  ${{ github.event.inputs.target_stage || 'UAT' }}
  DRY_RUN_FLAG:  ${{ github.event.inputs.dry_run      || 'false' }}
  TRIGGER_TYPE:  ${{ github.event_name == 'push' && 'auto (schema change)' || 'manual' }}

# ─────────────────────────────────────────────────────────────────────────────
# SETUP: Required GitHub configuration before running:
#
# Secrets (Settings → Secrets → Actions):
#   FABRIC_TENANT_ID       Azure AD tenant ID
#   FABRIC_CLIENT_ID       Service principal app (client) ID
#   FABRIC_CLIENT_SECRET   Service principal secret
#
# Variables (Settings → Variables → Actions):
#   DEPLOYMENT_PIPELINE_ID   Fabric deployment pipeline ID (GUID)
#   DEV_WORKSPACE_ID         Dev workspace ID (GUID)
#   UAT_WORKSPACE_ID         UAT workspace ID (GUID)
#   PROD_WORKSPACE_ID        Prod workspace ID (GUID)
#
# Environments (Settings → Environments):
#   promotion-approval       Add required reviewers for the approval gate
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1 — Pre-flight: validate schema registry, summarise plan
  # Runs immediately — no approval needed
  # ───────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Pre-flight Schema Validation"
    runs-on: ubuntu-latest
    outputs:
      schema_version: ${{ steps.schema.outputs.version }}
      table_count: ${{ steps.schema.outputs.table_count }}
      dry_run: ${{ env.DRY_RUN_FLAG }}
    steps:
      - uses: actions/checkout@v4

      - name: "📋 Read Schema Registry"
        id: schema
        run: |
          VERSION=$(python3 -c "
          import re
          content = open('notebooks/00_schema_registry.py').read()
          m = re.search(r'SCHEMA_VERSION\s*=\s*[\"\']([\d.]+)', content)
          print(m.group(1) if m else 'unknown')
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          TABLE_COUNT=$(python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          print(len(SCHEMAS))
          ")
          echo "table_count=$TABLE_COUNT" >> $GITHUB_OUTPUT

          echo "Schema Version : $VERSION"
          echo "Tables defined : $TABLE_COUNT"

      - name: "✅ Validate Schema Registry Syntax"
        run: |
          python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          print(f'Schema version  : {SCHEMA_VERSION}')
          print(f'Tables defined  : {len(SCHEMAS)}')
          total_cols = sum(len(s[\"columns\"]) for s in SCHEMAS.values())
          print(f'Total columns   : {total_cols}')
          print()
          for t, s in SCHEMAS.items():
              layer = 'BRONZE' if t.startswith('bronze') else 'SILVER'
              print(f'  [{layer}] {t}: {len(s[\"columns\"])} columns')
          print()
          print('Schema registry syntax: OK')
          "

      - name: "📊 Write Pre-flight Summary"
        run: |
          VERSION="${{ steps.schema.outputs.version }}"
          TABLE_COUNT="${{ steps.schema.outputs.table_count }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"

          {
            echo "# 🚀 Schema Promotion Pre-flight"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Promotion** | \`$SOURCE\` → \`$TARGET\` |"
            echo "| **Schema Version** | \`v$VERSION\` |"
            echo "| **Tables** | $TABLE_COUNT |"
            echo "| **Dry Run** | $DRY_RUN |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "## Tables in Schema Registry"
            echo ""
            echo "| Table | Layer | Columns |"
            echo "|---|---|---|"
            python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          for t, s in SCHEMAS.items():
              layer = '🟫 Bronze' if t.startswith('bronze') else '🪙 Silver'
              print(f'| \`{t}\` | {layer} | {len(s[\"columns\"])} |')
            "
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "> ⚠️ **DRY RUN** — validation only, no deployment will occur."
            else
              echo "> ✅ Pre-flight passed. Awaiting approval to deploy."
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────
  # JOB 2 — Approval gate + deployment
  # Pauses here until a reviewer approves in the GitHub UI
  # ───────────────────────────────────────────────────────────
  deploy:
    name: "🚢 Deploy via Fabric Pipeline"
    runs-on: ubuntu-latest
    needs: preflight
    environment: promotion-approval   # ← approval gate is HERE
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "⚠️  No FABRIC_TENANT_ID secret — running in demo/dry-run mode"
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "⚠️  Token acquisition failed — running in demo/dry-run mode"
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🏗️ Verify Source & Target Workspaces"
        run: |
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"
          DEV_WS="${{ vars.DEV_WORKSPACE_ID }}"
          UAT_WS="${{ vars.UAT_WORKSPACE_ID }}"
          TOKEN="${{ steps.token.outputs.token }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"

          echo "============================================"
          echo "  Workspace Promotion Gate"
          echo "  $SOURCE → $TARGET"
          echo "  Schema v$SCHEMA_VERSION"
          echo "============================================"
          echo ""
          echo "  Dev workspace ID : $DEV_WS"
          echo "  UAT workspace ID : $UAT_WS"
          echo ""

          if [ "$DEMO_MODE" = "true" ] || [ -z "$TOKEN" ] || [ "$TOKEN" = "DEMO_TOKEN" ]; then
            echo "⚠️  Token unavailable — skipping live API checks"
            echo "   Schema enforcement will still run in Job 3"
          else
            echo "🔍 Dev workspace items (source of truth):"
            DEV_ITEMS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$DEV_WS/items")
            echo "$DEV_ITEMS" | jq -r '.value[] | "  [\(.type)] \(.displayName)"' 2>/dev/null \
              || echo "  (no items or could not parse response)"
            DEV_COUNT=$(echo "$DEV_ITEMS" | jq '.value | length' 2>/dev/null || echo "?")
            echo "  Total: $DEV_COUNT items in Dev"

            echo ""
            echo "🔍 UAT workspace items (before promotion):"
            UAT_ITEMS=$(curl -s \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.fabric.microsoft.com/v1/workspaces/$UAT_WS/items")
            echo "$UAT_ITEMS" | jq -r '.value[] | "  [\(.type)] \(.displayName)"' 2>/dev/null \
              || echo "  (no items — schemas have not been promoted yet)"
            UAT_COUNT=$(echo "$UAT_ITEMS" | jq '.value | length' 2>/dev/null || echo "?")
            echo "  Total: $UAT_COUNT items in UAT"

            echo ""
            echo "✅  Both workspaces verified — proceeding to schema enforcement (Job 3)"
          fi

      - name: "📝 Write Deploy Summary"
        if: always()
        run: |
          {
            echo "## 🚢 Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Promotion** | \`${{ env.SOURCE_STAGE }}\` → \`${{ env.TARGET_STAGE }}\` |"
            echo "| **Schema Version** | \`v${{ needs.preflight.outputs.schema_version }}\` |"
            echo "| **Approved by** | @${{ github.actor }} |"
            if [ "${{ env.DRY_RUN_FLAG }}" = "true" ]; then
              echo "| **Status** | ⚠️ Dry run — no changes deployed |"
            else
              echo "| **Status** | ✅ Deployment pipeline triggered |"
            fi
          } >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────
  # JOB 3 — Schema Enforcement
  # Runs 00_apply_schema in the target workspace to create/update tables
  # ───────────────────────────────────────────────────────────
  enforce-schemas:
    name: "🗄️ Enforce Schemas in Target Workspace"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🗄️ Upload & Run Schema Enforcement Notebook"
        run: |
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"
          TOKEN="${{ steps.token.outputs.token }}"

          case "$TARGET" in
            "UAT")        WS_ID="${{ vars.UAT_WORKSPACE_ID }}" ;;
            "Production") WS_ID="${{ vars.PROD_WORKSPACE_ID }}" ;;
          esac

          echo "Target workspace : $TARGET ($WS_ID)"
          echo "Schema version   : ${{ needs.preflight.outputs.schema_version }}"
          echo "Tables expected  : ${{ needs.preflight.outputs.table_count }}"
          echo ""

          echo "Tables to enforce:"
          python3 -c "
          exec(open('notebooks/00_schema_registry.py').read())
          for t, s in SCHEMAS.items():
              print(f'  CREATE TABLE IF NOT EXISTS {t}  ({len(s[\"columns\"])} columns)')
          "

          # Generate self-contained notebook payload from schema registry
          python3 scripts/gen_nb_payload.py

          if [ "$DRY_RUN" = "true" ] || [ "$DEMO_MODE" = "true" ] || [ -z "$WS_ID" ] || [[ "$WS_ID" == "<"* ]]; then
            echo ""
            echo "▶  DRY RUN — would upload & trigger: 00_apply_schema"
            echo "   Workspace: $TARGET ($WS_ID)"
            echo "   Creates all ${{ needs.preflight.outputs.table_count }} tables via CREATE TABLE IF NOT EXISTS"
            echo ""
            echo "✅  Dry run complete"
            rm -f /tmp/nb_payload.json /tmp/gen_nb.py
          else
            # Upload notebook — create new, fall back to existing on 409
            CREATE_RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items" \
              -d @/tmp/nb_payload.json)

            HTTP_CODE=$(echo "$CREATE_RESP" | tail -1)
            BODY=$(echo "$CREATE_RESP" | head -n -1)

            if [ "$HTTP_CODE" = "201" ]; then
              NOTEBOOK_ID=$(echo "$BODY" | jq -r '.id')
              echo "✅ Notebook uploaded: $NOTEBOOK_ID"
            elif [ "$HTTP_CODE" = "202" ]; then
              sleep 5
              ITEMS=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Notebook")
              NOTEBOOK_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName == "00_apply_schema") | .id')
              echo "✅ Notebook created (async): $NOTEBOOK_ID"
            elif [ "$HTTP_CODE" = "409" ]; then
              ITEMS=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Notebook")
              NOTEBOOK_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName == "00_apply_schema") | .id')
              echo "📎 Using existing notebook: $NOTEBOOK_ID"
            else
              echo "⚠️  Upload returned HTTP $HTTP_CODE — trying to find existing notebook"
              ITEMS=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Notebook")
              NOTEBOOK_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName == "00_apply_schema") | .id')
            fi

            rm -f /tmp/nb_payload.json /tmp/gen_nb.py

            if [ -z "$NOTEBOOK_ID" ]; then
              echo "❌ Could not find or create 00_apply_schema notebook in $TARGET"
              exit 1
            fi

            # Trigger notebook execution
            RUN_RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items/$NOTEBOOK_ID/jobs/instances?jobType=RunNotebook")

            RUN_HTTP=$(echo "$RUN_RESP" | tail -1)
            if [ "$RUN_HTTP" = "202" ] || [ "$RUN_HTTP" = "200" ]; then
              echo "✅ Schema enforcement notebook triggered in $TARGET"
              echo "   Tables will appear in Lakehouse within 1-3 minutes"
            else
              echo "⚠️  Notebook trigger returned HTTP $RUN_HTTP"
              echo "$(echo "$RUN_RESP" | head -n -1)"
            fi
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 4 — Data Quality Verification
  # Triggers 03_data_quality_checks in the target workspace
  # ───────────────────────────────────────────────────────────
  verify:
    name: "✅ Data Quality Verification"
    runs-on: ubuntu-latest
    needs: [preflight, enforce-schemas]
    steps:
      - uses: actions/checkout@v4

      - name: "🔑 Get Fabric Access Token"
        id: token
        run: |
          if [ -z "${{ secrets.FABRIC_TENANT_ID }}" ]; then
            echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
            echo "demo_mode=true" >> $GITHUB_OUTPUT
          else
            TOKEN=$(curl -s -X POST \
              "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
              -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
              -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
              -d "scope=https://api.fabric.microsoft.com/.default" \
              -d "grant_type=client_credentials" | jq -r '.access_token')
            if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
              echo "token=DEMO_TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=true" >> $GITHUB_OUTPUT
            else
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "demo_mode=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "🔬 Trigger Quality Checks Notebook (03_data_quality_checks)"
        run: |
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"
          DEMO_MODE="${{ steps.token.outputs.demo_mode }}"

          case "$TARGET" in
            "UAT")        WS_ID="${{ vars.UAT_WORKSPACE_ID }}" ;;
            "Production") WS_ID="${{ vars.PROD_WORKSPACE_ID }}" ;;
          esac

          if [ "$DRY_RUN" = "true" ] || [ "$DEMO_MODE" = "true" ] || [ -z "$WS_ID" ] || [[ "$WS_ID" == "<"* ]]; then
            echo "▶  DRY RUN — would trigger notebook: 03_data_quality_checks"
            echo "   Checks: row counts, null rates, duplicates, range validation"
            echo ""
            echo "✅  Dry run complete — quality gate would enforce:"
            echo "    - bronze_datacenters    : min 10 rows, 0 nulls on datacenter_id"
            echo "    - silver_datacenters    : pue between 1.0–3.0"
            echo "    - bronze_power_capacity : utilization_pct between 0–100"
            echo "    - silver_customer_deployments : 0 duplicate deployment_id"
          else
            ITEMS=$(curl -s \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
              "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items?type=Notebook")

            QA_ID=$(echo "$ITEMS" | jq -r '.value[] | select(.displayName == "03_data_quality_checks") | .id')

            if [ -n "$QA_ID" ]; then
              curl -s -X POST \
                -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
                -H "Content-Type: application/json" \
                "https://api.fabric.microsoft.com/v1/workspaces/$WS_ID/items/$QA_ID/jobs/instances?jobType=RunNotebook"
              echo "✅  Quality checks notebook triggered in $TARGET"
            else
              echo "⚠️  03_data_quality_checks notebook not found — skipping quality gate"
            fi
          fi

      - name: "🏷️ Tag Promotion in Git"
        run: |
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — skipping Git tag"
          else
            TAG="promote-${TARGET,,}-schema-v${SCHEMA_VERSION}-$(date +%Y%m%d%H%M)"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "GitHub Actions"
            git tag "$TAG" || echo "Tag already exists, skipping"
            git push origin "$TAG" || echo "Could not push tag (non-fatal)"
            echo "✅  Tagged: $TAG"
          fi

      - name: "📊 Write Final Summary"
        if: always()
        run: |
          SCHEMA_VERSION="${{ needs.preflight.outputs.schema_version }}"
          TABLE_COUNT="${{ needs.preflight.outputs.table_count }}"
          SOURCE="${{ env.SOURCE_STAGE }}"
          TARGET="${{ env.TARGET_STAGE }}"
          DRY_RUN="${{ env.DRY_RUN_FLAG }}"

          {
            echo "# ✅ Promotion Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Promoted** | \`$SOURCE\` → \`$TARGET\` |"
            echo "| **Schema Version** | \`v$SCHEMA_VERSION\` |"
            echo "| **Tables Enforced** | $TABLE_COUNT |"
            echo "| **Quality Checks** | Triggered in \`$TARGET\` |"
            echo "| **Dry Run** | $DRY_RUN |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo ""
            echo "## What happened"
            echo "1. ✅ Schema registry validated (\`notebooks/00_schema_registry.py\`)"
            echo "2. ✅ Fabric deployment pipeline triggered (\`$SOURCE\` → \`$TARGET\`)"
            echo "3. ✅ Schema enforcement notebook run in \`$TARGET\` workspace"
            echo "4. ✅ Data quality checks triggered in \`$TARGET\` workspace"
            echo ""
            echo "> **Next step:** Open \`$TARGET\` workspace in Fabric to verify tables appear in the Lakehouse."
          } >> $GITHUB_STEP_SUMMARY
